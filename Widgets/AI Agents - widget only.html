<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Hub Widget</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,400;0,500;0,700;0,900;1,400;1,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent:           #7a5af8;
      --accent-hover:     #6938ef;
      --accent-light:     #f4f3ff;
      --accent-border:    rgba(122,90,248,.18);
      --text-dark:        #101828;
      --text-body:        #607179;
      --text-muted:       #6b7280;
      --text-label:       #667085;
      --bg-page:          #f2f7fa;
      --bg-white:         #ffffff;
      --border:           #e5e7eb;
      --border-soft:      #eaecf0;
      --shadow-sm:        0px 1px 2px #1018280d;
      --shadow-md:        0px 1px 3px #1018281a, 0px 1px 2px #1018280f;
      --shadow-lg:        0px 12px 16px -4px #10182814, 0px 4px 6px -2px #10182808;
      --shadow-xl:        0px 20px 24px -4px #10182814, 0px 8px 8px -4px #10182808;
      --green-check:      #16b364;
      --green-check-bg:   #dcfce7;
      --font:             'Roboto', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      --radius-sm:        6px;
      --radius-md:        10px;
      --radius-lg:        14px;
      --radius-xl:        18px;
    }

    body { font-family: var(--font); background: var(--bg-page); display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .widget-wrap { position: relative; padding: 60px; }

    /* right – hub diagram */
    .hero-right {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      min-height: 340px;
    }

    .hub-wrap {
      position: relative;
      width: 330px;
      height: 330px;
    }

    /* faint radial bg */
    .hub-wrap::before {
      content: '';
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(122,90,248,.06) 0%, transparent 70%);
    }

    .hub-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .hub-center {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      width: 64px; height: 64px;
      background: radial-gradient(circle at 38% 35%, #c4b5fd 0%, #8b6df5 42%, #5b3dd4 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      z-index: 10;
      box-shadow:
        0 0 0 10px rgba(122,90,248,.09),
        0 0 0 22px rgba(122,90,248,.04),
        0 4px 18px rgba(122,90,248,.30);
    }

    .hub-node {
      position: absolute;
      width: 40px; height: 40px;
      background: #fff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      color: var(--text-muted);
      box-shadow: var(--shadow-md);
      z-index: 5;
      transform: translate(-50%,-50%);
    }
    @keyframes node-receive {
      0%   { box-shadow: 0 0 0 0    var(--nc, rgba(122,90,248,.45)), 0 2px 8px rgba(0,0,0,.10); }
      50%  { box-shadow: 0 0 0 8px  var(--nc, rgba(122,90,248,.15)), 0 2px 8px rgba(0,0,0,.10); }
      100% { box-shadow: 0 0 0 14px transparent,                     0 2px 8px rgba(0,0,0,.10); }
    }
    .hub-node.node-receiving { animation: node-receive 0.85s ease-out forwards; }

    /* notification cards */
    .hub-notif {
      position: absolute;
      background: #fff;
      border-radius: var(--radius-md);
      padding: 9px 14px;
      box-shadow: var(--shadow-xl);
      z-index: 20;
      min-width: 148px;
    }
    .hub-notif-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 1px;
    }
    .hub-notif-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .hub-notif-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-dark);
    }
    .hub-notif-time {
      font-size: 11px;
      color: var(--text-muted);
      margin-left: 13px;
    }

    /* notif positions relative to hub-wrap */
    .notif-review   { top: 30%; left: -60px; }
    .notif-booking  { top: 20%; right: -60px; }

    /* ═══════════════════════════════════════════════
       HUB ANIMATIONS
    ═══════════════════════════════════════════════ */

    /* Rotating gear rings */
    @keyframes hub-gear-cw  { to { transform: rotate(360deg);  } }
    @keyframes hub-gear-ccw { to { transform: rotate(-360deg); } }

    .hub-ring {
      position: absolute;
      top: 50%; left: 50%;
      border-radius: 50%;
      pointer-events: none;
      z-index: 3;
    }
    .hub-ring--lg {
      width: 156px; height: 156px;
      margin-left: -78px; margin-top: -78px;
      border: 1.5px dashed rgba(122,90,248,.16);
      animation: hub-gear-cw 38s linear infinite;
    }
    .hub-ring--md {
      width: 116px; height: 116px;
      margin-left: -58px; margin-top: -58px;
      border: 1.5px dashed rgba(122,90,248,.20);
      animation: hub-gear-ccw 26s linear infinite;
    }

    /* Hub center gentle breathe */
    @keyframes hub-glow-pulse {
      0%, 100% {
        box-shadow: 0 0 0 10px rgba(122,90,248,.08), 0 0 0 22px rgba(122,90,248,.03), 0 4px 14px rgba(122,90,248,.25);
      }
      50% {
        box-shadow: 0 0 0 13px rgba(122,90,248,.13), 0 0 0 28px rgba(122,90,248,.06), 0 4px 20px rgba(122,90,248,.40);
      }
    }
    .hub-center { animation: hub-glow-pulse 5s ease-in-out infinite; }

    /* Single slow radar pulse from center */
    @keyframes hub-radar {
      0%   { transform: scale(1);   opacity: .5; }
      100% { transform: scale(3.6); opacity: 0;  }
    }
    .hub-pulse-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1px solid rgba(122,90,248,.35);
      animation: hub-radar 5.5s ease-out infinite;
      pointer-events: none;
    }

  </style>
</head>
<body>

<div class="widget-wrap">
  <div class="hero-right">
        <div class="hub-wrap">

          <!-- Rotating gear rings -->
          <div class="hub-ring hub-ring--lg"></div>
          <div class="hub-ring hub-ring--md"></div>

          <!-- Spokes + animated signal particles -->
          <svg class="hub-svg" viewBox="0 0 330 330" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <style>.spoke { stroke: #d0d5dd; stroke-width: 1.2; stroke-dasharray: 4 4; fill: none; }</style>
              <filter id="sig-glow" x="-100%" y="-100%" width="300%" height="300%">
                <feGaussianBlur stdDeviation="2" result="blur"/>
                <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
              </filter>
            </defs>

            <!-- Spokes -->
            <line class="spoke" x1="165" y1="165" x2="165" y2="22"/>
            <line class="spoke" x1="165" y1="165" x2="279" y2="51"/>
            <line class="spoke" x1="165" y1="165" x2="307" y2="165"/>
            <line class="spoke" x1="165" y1="165" x2="261" y2="279"/>
            <line class="spoke" x1="165" y1="165" x2="165" y2="308"/>
            <line class="spoke" x1="165" y1="165" x2="69"  y2="279"/>
            <line class="spoke" x1="165" y1="165" x2="23"  y2="165"/>
            <line class="spoke" x1="165" y1="165" x2="51"  y2="51"/>

            <!-- ── Outbound signals (center → node) ── -->
            <circle r="4.5" fill="#7a5af8" filter="url(#sig-glow)">
              <animateMotion dur="4.2s" begin="0s" repeatCount="indefinite" path="M165,165 L165,22"/>
              <animate attributeName="opacity" dur="4.2s" begin="0s" repeatCount="indefinite" values="0;1;1;0" keyTimes="0;0.06;0.90;1"/>
            </circle>
            <circle r="4.5" fill="#0ba5ec" filter="url(#sig-glow)">
              <animateMotion dur="4.8s" begin="0.8s" repeatCount="indefinite" path="M165,165 L279,51"/>
              <animate attributeName="opacity" dur="4.8s" begin="0.8s" repeatCount="indefinite" values="0;1;1;0" keyTimes="0;0.06;0.90;1"/>
            </circle>
            <circle r="4.5" fill="#f59e0b" filter="url(#sig-glow)">
              <animateMotion dur="4.4s" begin="1.6s" repeatCount="indefinite" path="M165,165 L307,165"/>
              <animate attributeName="opacity" dur="4.4s" begin="1.6s" repeatCount="indefinite" values="0;1;1;0" keyTimes="0;0.06;0.90;1"/>
            </circle>
            <circle r="4.5" fill="#f59e0b" filter="url(#sig-glow)">
              <animateMotion dur="5.0s" begin="2.4s" repeatCount="indefinite" path="M165,165 L261,279"/>
              <animate attributeName="opacity" dur="5.0s" begin="2.4s" repeatCount="indefinite" values="0;1;1;0" keyTimes="0;0.06;0.90;1"/>
            </circle>
            <circle r="4.5" fill="#16b364" filter="url(#sig-glow)">
              <animateMotion dur="4.0s" begin="1.2s" repeatCount="indefinite" path="M165,165 L165,308"/>
              <animate attributeName="opacity" dur="4.0s" begin="1.2s" repeatCount="indefinite" values="0;1;1;0" keyTimes="0;0.06;0.90;1"/>
            </circle>
            <circle r="4.5" fill="#6938ef" filter="url(#sig-glow)">
              <animateMotion dur="4.6s" begin="3.0s" repeatCount="indefinite" path="M165,165 L69,279"/>
              <animate attributeName="opacity" dur="4.6s" begin="3.0s" repeatCount="indefinite" values="0;1;1;0" keyTimes="0;0.06;0.90;1"/>
            </circle>
            <circle r="4.5" fill="#0ba5ec" filter="url(#sig-glow)">
              <animateMotion dur="5.2s" begin="2.0s" repeatCount="indefinite" path="M165,165 L23,165"/>
              <animate attributeName="opacity" dur="5.2s" begin="2.0s" repeatCount="indefinite" values="0;1;1;0" keyTimes="0;0.06;0.90;1"/>
            </circle>
            <circle r="4.5" fill="#17cfbc" filter="url(#sig-glow)">
              <animateMotion dur="4.2s" begin="3.6s" repeatCount="indefinite" path="M165,165 L51,51"/>
              <animate attributeName="opacity" dur="4.2s" begin="3.6s" repeatCount="indefinite" values="0;1;1;0" keyTimes="0;0.06;0.90;1"/>
            </circle>

            <!-- ── Inbound signals (node → center, white) ── -->
            <circle r="3" fill="rgba(255,255,255,.80)" filter="url(#sig-glow)">
              <animateMotion dur="4.6s" begin="2.1s" repeatCount="indefinite" path="M165,22 L165,165"/>
              <animate attributeName="opacity" dur="4.6s" begin="2.1s" repeatCount="indefinite" values="0;.75;.75;0" keyTimes="0;0.06;0.90;1"/>
            </circle>
            <circle r="3" fill="rgba(255,255,255,.80)" filter="url(#sig-glow)">
              <animateMotion dur="4.2s" begin="3.0s" repeatCount="indefinite" path="M279,51 L165,165"/>
              <animate attributeName="opacity" dur="4.2s" begin="3.0s" repeatCount="indefinite" values="0;.75;.75;0" keyTimes="0;0.06;0.90;1"/>
            </circle>
            <circle r="3" fill="rgba(255,255,255,.80)" filter="url(#sig-glow)">
              <animateMotion dur="5.0s" begin="2.7s" repeatCount="indefinite" path="M307,165 L165,165"/>
              <animate attributeName="opacity" dur="5.0s" begin="2.7s" repeatCount="indefinite" values="0;.75;.75;0" keyTimes="0;0.06;0.90;1"/>
            </circle>
            <circle r="3" fill="rgba(255,255,255,.80)" filter="url(#sig-glow)">
              <animateMotion dur="4.4s" begin="0.6s" repeatCount="indefinite" path="M261,279 L165,165"/>
              <animate attributeName="opacity" dur="4.4s" begin="0.6s" repeatCount="indefinite" values="0;.75;.75;0" keyTimes="0;0.06;0.90;1"/>
            </circle>
            <circle r="3" fill="rgba(255,255,255,.80)" filter="url(#sig-glow)">
              <animateMotion dur="4.8s" begin="3.4s" repeatCount="indefinite" path="M165,308 L165,165"/>
              <animate attributeName="opacity" dur="4.8s" begin="3.4s" repeatCount="indefinite" values="0;.75;.75;0" keyTimes="0;0.06;0.90;1"/>
            </circle>
            <circle r="3" fill="rgba(255,255,255,.80)" filter="url(#sig-glow)">
              <animateMotion dur="4.0s" begin="1.6s" repeatCount="indefinite" path="M69,279 L165,165"/>
              <animate attributeName="opacity" dur="4.0s" begin="1.6s" repeatCount="indefinite" values="0;.75;.75;0" keyTimes="0;0.06;0.90;1"/>
            </circle>
            <circle r="3" fill="rgba(255,255,255,.80)" filter="url(#sig-glow)">
              <animateMotion dur="5.2s" begin="0.2s" repeatCount="indefinite" path="M23,165 L165,165"/>
              <animate attributeName="opacity" dur="5.2s" begin="0.2s" repeatCount="indefinite" values="0;.75;.75;0" keyTimes="0;0.06;0.90;1"/>
            </circle>
            <circle r="3" fill="rgba(255,255,255,.80)" filter="url(#sig-glow)">
              <animateMotion dur="4.6s" begin="2.2s" repeatCount="indefinite" path="M51,51 L165,165"/>
              <animate attributeName="opacity" dur="4.6s" begin="2.2s" repeatCount="indefinite" values="0;.75;.75;0" keyTimes="0;0.06;0.90;1"/>
            </circle>
          </svg>

          <!-- 8 channel nodes -->
          <div id="hnode-0" class="hub-node" style="top:22px;left:165px;--nc:rgba(122,90,248,.45)">
            <i class="fa-regular fa-comment" style="color:#7a5af8"></i>
          </div>
          <div id="hnode-1" class="hub-node" style="top:51px;left:279px;--nc:rgba(11,165,236,.45)">
            <i class="fa-regular fa-envelope" style="color:#0ba5ec"></i>
          </div>
          <div id="hnode-2" class="hub-node" style="top:165px;left:307px;--nc:rgba(245,158,11,.45)">
            <i class="fa-solid fa-mobile-screen" style="color:#f59e0b"></i>
          </div>
          <div id="hnode-3" class="hub-node" style="top:279px;left:261px;--nc:rgba(245,158,11,.45)">
            <i class="fa-regular fa-star" style="color:#f59e0b"></i>
          </div>
          <div id="hnode-4" class="hub-node" style="top:308px;left:165px;--nc:rgba(22,179,100,.45)">
            <i class="fa-regular fa-calendar" style="color:#16b364"></i>
          </div>
          <div id="hnode-5" class="hub-node" style="top:279px;left:69px;--nc:rgba(105,56,239,.45)">
            <i class="fa-solid fa-phone" style="color:#6938ef"></i>
          </div>
          <div id="hnode-6" class="hub-node" style="top:165px;left:23px;--nc:rgba(11,165,236,.45)">
            <i class="fa-brands fa-facebook-messenger" style="color:#0ba5ec"></i>
          </div>
          <div id="hnode-7" class="hub-node" style="top:51px;left:51px;--nc:rgba(23,207,188,.45)">
            <i class="fa-solid fa-globe" style="color:#17cfbc"></i>
          </div>

          <!-- Hub center with pulse ring -->
          <div class="hub-center">
            <div class="hub-pulse-ring"></div>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="white" style="width:28px;height:28px;flex-shrink:0">
              <path d="M9.813 15.904 9 18.75l-.813-2.846a4.5 4.5 0 0 0-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 0 0 3.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 0 0 3.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 0 0-3.09 3.09ZM18.259 8.715 18 9.75l-.259-1.035a3.375 3.375 0 0 0-2.455-2.456L14.25 6l1.036-.259a3.375 3.375 0 0 0 2.455-2.456L18 2.25l.259 1.035a3.375 3.375 0 0 0 2.456 2.456L21.75 6l-1.035.259a3.375 3.375 0 0 0-2.456 2.456Z"/>
            </svg>
          </div>

          <!-- Notification cards -->
          <div class="hub-notif notif-review">
            <div class="hub-notif-row">
              <div class="hub-notif-dot" style="background:#22c55e;"></div>
              <span class="hub-notif-title">Review replied</span>
            </div>
            <div class="hub-notif-time">5s ago</div>
          </div>
          <div class="hub-notif notif-booking">
            <div class="hub-notif-row">
              <div class="hub-notif-dot" style="background:#7a5af8;"></div>
              <span class="hub-notif-title">Booking confirmed</span>
            </div>
            <div class="hub-notif-time">8s ago</div>
          </div>

        </div>
  </div>
</div>

<script>
  /* ── Hub node receive-pulse ──
     Each entry matches the inbound signal for that node:
     begin + dur = first arrival; dur = repeat interval            */
  (function() {
    var nodes = [
      { id: 'hnode-0', begin: 2.1, dur: 4.6 },
      { id: 'hnode-1', begin: 3.0, dur: 4.2 },
      { id: 'hnode-2', begin: 2.7, dur: 5.0 },
      { id: 'hnode-3', begin: 0.6, dur: 4.4 },
      { id: 'hnode-4', begin: 3.4, dur: 4.8 },
      { id: 'hnode-5', begin: 1.6, dur: 4.0 },
      { id: 'hnode-6', begin: 0.2, dur: 5.2 },
      { id: 'hnode-7', begin: 2.2, dur: 4.6 },
    ];
    nodes.forEach(function(n) {
      var el = document.getElementById(n.id);
      if (!el) return;
      function pulse() {
        el.classList.remove('node-receiving');
        void el.offsetWidth; /* force reflow so animation restarts */
        el.classList.add('node-receiving');
      }
      var firstMs = (n.begin + n.dur) * 1000;
      setTimeout(function() {
        pulse();
        setInterval(pulse, n.dur * 1000);
      }, firstMs);
    });
  })();
</script>

</body>
</html>
