<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Human-first AI — hero (preview)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#000000; --ink:#ffffff; --warm:#f5b14c; --cold:#69727e; --cold-dim:#39424f; --panel:#080808;
    --stream-h:480px; --tile-gap:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px}
  .hero{width:100%;max-width:1080px}
  .eyebrow{display:flex;align-items:center;gap:9px;color:var(--warm);font-size:14px;font-weight:500;letter-spacing:.4px;margin-bottom:18px}
  .eyebrow .mark{width:8px;height:8px;border-radius:50%;background:var(--warm)}
  .lead{display:flex;gap:28px;align-items:flex-end;margin-bottom:18px}
  .lead-left{flex:1.7;font-size:clamp(28px,4.6vw,52px);font-weight:500;line-height:1.08;color:var(--ink)}
  .lead-right{flex:1;font-size:clamp(28px,4.6vw,52px);font-weight:500;line-height:1.08;color:var(--cold)}
  .cols{display:flex;gap:28px;align-items:stretch}
  .art-stream{flex:1.7;display:flex;gap:var(--tile-gap);height:var(--stream-h);overflow:hidden;-webkit-mask-image:linear-gradient(transparent,#000 8%,#000 92%,transparent);mask-image:linear-gradient(transparent,#000 8%,#000 92%,transparent)}
  .art-col{flex:1;overflow:hidden}
  .art-track{display:flex;flex-direction:column;will-change:transform}
  .art-col:nth-child(1) .art-track{animation:rise 72s linear infinite}
  .art-col:nth-child(2) .art-track{animation:rise 92s linear infinite}

  .art-tile{position:relative;margin:0 0 var(--tile-gap);border-radius:10px;overflow:hidden;border:1px solid rgba(245,177,76,.20);isolation:isolate;container-type:inline-size}
  .art-tile img{display:block;width:100%;height:auto;background:#11131b}
  .art-word{position:absolute;inset:0;z-index:2;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',Georgia,serif;font-size:clamp(18px,15cqmin,46px);font-weight:600;font-style:italic;letter-spacing:.5px;text-transform:lowercase;color:#fff;mix-blend-mode:overlay;pointer-events:none;opacity:0.70}
  @keyframes rise{to{transform:translateY(-50%)}}

  .ticker-wrap{flex:1;height:var(--stream-h);overflow:hidden;position:relative;background:var(--panel);border:1px solid rgba(105,114,126,.28);border-radius:12px;-webkit-mask-image:linear-gradient(transparent,#000 10%,#000 90%,transparent);mask-image:linear-gradient(transparent,#000 10%,#000 90%,transparent)}
  .jargon-panel{display:flex;flex-direction:column;justify-content:center;height:100%;padding:12px 18px;gap:2px}
  .t-line{font-family:'JetBrains Mono',ui-monospace,monospace;font-size:13px;color:var(--cold);padding:7px 0;letter-spacing:.3px;display:flex;gap:10px;align-items:baseline}
  .t-line-flash{animation:word-flash 1s ease both}
  @keyframes word-flash{
    0%{color:var(--cold);text-shadow:none}
    30%{color:var(--warm);text-shadow:0 0 14px rgba(245,177,76,.6)}
    65%{color:var(--warm);text-shadow:0 0 14px rgba(245,177,76,.6)}
    100%{color:var(--cold);text-shadow:none}
  }
  .pre{color:var(--cold-dim);font-size:12px}
  .cursor{display:inline-block;color:var(--warm);animation:blink .75s step-end infinite;margin-left:1px}
  @keyframes blink{50%{opacity:0}}

  .tagline{margin:26px 0 0;font-size:clamp(15px,1.8vw,18px);color:#cdc6b6;line-height:1.6;max-width:620px}
  .tagline .em{color:var(--warm)}
  .cta{margin-top:20px;background:var(--warm);color:#1a1206;border:none;border-radius:10px;padding:13px 22px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:8px;transition:filter .15s,transform .05s}
  .cta:hover{filter:brightness(1.06)}
  .cta:active{transform:scale(.98)}
  .credit{margin-top:22px;font-size:12px;color:#5a5d68}
  @media (max-width:760px){:root{--stream-h:360px}.lead{flex-direction:column;gap:2px;align-items:flex-start}.lead-left,.lead-right{flex:none}.cols{flex-direction:column}.art-stream{flex:none}.ticker-wrap{flex:none;height:200px}}
  @media (prefers-reduced-motion:reduce){.art-track,.t-line-flash,.cursor{animation:none}}
</style>
</head>
<body>
  <section class="hero">
    <div class="eyebrow"><span class="mark"></span>Human-first AI</div>
    <div class="lead">
      <div class="lead-left">Humans were meant to</div>
      <div class="lead-right">not</div>
    </div>
    <div class="cols">
      <div class="art-stream">
        <div class="art-col"><div class="art-track" data-col="a"></div></div>
        <div class="art-col"><div class="art-track" data-col="b"></div></div>
      </div>
      <div class="ticker-wrap"><div class="jargon-panel" id="jargon-panel"></div></div>
    </div>
    <p class="tagline">Automate what you hate — so you can get back to <span class="em">what we were meant for</span>.</p>
    <button class="cta" type="button">See our human-first solutions <span aria-hidden="true">&#8599;</span></button>
    <p class="credit">Images © their respective rights holders.</p>
  </section>
<script>
  const ART = {
    a: [
      { s:'Human Photos/Advance_Ulysses S Grant.webp', t:'Ulysses S. Grant', w:'advance' },
      { s:'Human Photos/Breathe_.jpg', t:'breathe', w:'breathe' },
      { s:'Human Photos/Build_.jpg', t:'build', w:'build' },
      { s:'Human Photos/Change_Lincoln.jpg', t:'Abraham Lincoln', w:'change' },
      { s:'Human Photos/Climb_.jpg', t:'climb', w:'climb' },
      { s:'Human Photos/Defy_MLK.avif', t:'Martin Luther King Jr.', w:'defy' },
      { s:'Human Photos/Discover_Conquista-de-México-por-Cortés-Tenochtitlan-Painting.png', t:'Conquista de México por Cortés', w:'discover' },
      { s:'Human Photos/Explore_Sir David Attenborough.jpg', t:'Sir David Attenborough', w:'explore' },
      { s:'Human Photos/Innovate_.jpg', t:'innovate', w:'innovate' },
      { s:'Human Photos/Jump_.jpg', t:'jump', w:'jump' },
      { s:'Human Photos/Lift_.png', t:'lift', w:'lift' },
      { s:'Human Photos/Listen_.jpg', t:'listen', w:'listen' }
    ],
    b: [
      { s:'Human Photos/Play_.jpg', t:'play', w:'play' },
      { s:'Human Photos/Play_.png', t:'play', w:'play' },
      { s:'Human Photos/Reflect_.png', t:'reflect', w:'reflect' },
      { s:'Human Photos/Storytell_.jpg', t:'storytell', w:'storytell' },
      { s:'Human Photos/Tame_.webp', t:'tame', w:'tame' },
      { s:'Human Photos/Think_Auguste_Rodin_-_The_Thinker_1880.webp', t:'The Thinker (1880)', a:'Auguste Rodin', w:'think' },
      { s:'Human Photos/Uncover_.webp', t:'uncover', w:'uncover' },
      { s:'Human Photos/Wonder_James Web Telescope.jpg', t:'James Webb Telescope', w:'wonder' },
      { s:'Human Photos/Worship_.jpg', t:'worship', w:'worship' },
      { s:'Human Photos/disrupt_.webp', t:'disrupt', w:'disrupt' },
      { s:'Human Photos/witness_.webp', t:'witness', w:'witness' }
    ]
  };
  const JARGON = ['SAAS','Workflow','Integrate','Automate','Analyze','Report','Audit','Optimize','Streamline','Upsell','Synergize','Leverage','Onboard','Deploy','Iterate','Pivot','Monetize','Benchmark','KPI review','Funnel','Pipeline','Bandwidth','Circle back','Touch base','Action item','Deliverable','Reconcile','Scale'];

  // Build art columns
  function buildTrack(el, items) {
    const make = () => items.map(it => {
      const alt = it.a ? `${it.t} by ${it.a}` : it.t;
      return `<figure class="art-tile"><img loading="lazy" src="${it.s}" alt="${alt}"><span class="art-word">${it.w}</span></figure>`;
    }).join('');
    el.innerHTML = make() + make();
  }
  document.querySelectorAll('.art-track').forEach(t => buildTrack(t, ART[t.dataset.col]));

  // Word overlay opacity (0.70 floor → 1.0 at center)
  const stream = document.querySelector('.art-stream');
  const MIN_OPACITY = 0.70;
  (function tick() {
    const sr = stream.getBoundingClientRect();
    const cy = sr.top + sr.height / 2, half = sr.height / 2 || 1;
    document.querySelectorAll('.art-tile').forEach(t => {
      const r = t.getBoundingClientRect();
      let p = 1 - Math.abs((r.top + r.height / 2) - cy) / (half * 0.78);
      p = Math.max(0, Math.min(1, p)); p = p * p * (3 - 2 * p);
      const w = t.querySelector('.art-word');
      if (w) w.style.opacity = (MIN_OPACITY + p * (1 - MIN_OPACITY)).toFixed(3);
    });
    requestAnimationFrame(tick);
  })();

  // Jargon panel: static list, one word flashes then gets delete-typed
  (function() {
    const N = Math.min(JARGON.length, 9);
    const panel = document.getElementById('jargon-panel');
    let words = JARGON.slice(0, N);
    let activeIdx = Math.floor(N / 2);
    let phase = 'flash';
    let editText = words[activeIdx];
    let nextWord = '';
    let poolIdx = N;

    function render() {
      panel.innerHTML = '';
      words.forEach((w, i) => {
        const isActive = i === activeIdx;
        const inEdit = phase === 'delete' || phase === 'type';
        const text = isActive && inEdit ? editText : w;
        const div = document.createElement('div');
        div.className = 't-line' + (isActive && phase === 'flash' ? ' t-line-flash' : '');
        div.innerHTML = `<span class="pre">&gt;</span><span>${text}</span>` +
          (isActive && inEdit ? '<span class="cursor" aria-hidden="true">|</span>' : '');
        panel.appendChild(div);
      });
    }

    function runFlash() {
      phase = 'flash';
      render();
      setTimeout(() => {
        nextWord = JARGON[poolIdx % JARGON.length];
        poolIdx++;
        editText = words[activeIdx];
        phase = 'delete';
        runDelete();
      }, 1000);
    }

    function runDelete() {
      render();
      if (editText.length === 0) { runType(); return; }
      setTimeout(() => { editText = editText.slice(0, -1); runDelete(); }, 55);
    }

    function runType() {
      phase = 'type';
      render();
      if (editText.length >= nextWord.length) {
        words = words.slice();
        words[activeIdx] = nextWord;
        setTimeout(() => { activeIdx = (activeIdx + 1) % N; runFlash(); }, 350);
        return;
      }
      setTimeout(() => { editText = nextWord.slice(0, editText.length + 1); runType(); }, 65);
    }

    runFlash();
  })();
</script>
</body>
</html>
