<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Booking Calendar Widget</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f2f7fa;
    }
    .calendar-wrap {
      border-radius: 16px;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 4px 40px rgba(0,0,0,0.3);
      height: 640px;
      width: 780px;
    }
    .calendar-inner {
      transform: scale(0.65);
      transform-origin: top left;
      width: 153.85%;
    }
  </style>
</head>
<body>

<div class="calendar-wrap">
  <div class="calendar-inner">
    <iframe src="https://api.leadconnectorhq.com/widget/booking/JyXfpbgMAnJOMOySk5HL" style="width:100%;border:none;overflow:hidden;display:block" scrolling="no" id="JyXfpbgMAnJOMOySk5HL_1781658975912"></iframe>
    <script src="https://link.msgsndr.com/js/form_embed.js" type="text/javascript"></script>
  </div>
</div>

</body>
</html>
